name: 🐛 Bug 报告
description: 报告 MemoryCenter 的缺陷或异常行为
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请尽量填写完整信息，便于快速定位问题。

  - type: textarea
    id: what-happened
    attributes:
      label: Bug 描述
      description: 简要说明发生了什么问题
      placeholder: 调用 archive() 时返回错误 "..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 最小可复现示例
      placeholder: |
        1. 启动 MCP server ...
        2. 调用 archive tool，传入以下 turns ...
        3. 观察返回 ...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为应该发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么（包含完整错误信息 / 堆栈）
      render: shell
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: 接入方式
      description: 你是通过哪种方式使用 MemoryCenter 的
      options:
        - MCP Server (stdio)
        - MCP Server (Streamable HTTP)
        - HTTP REST API
        - Python 原生绑定 (PyO3)
        - Node.js 绑定 (napi-rs)
        - C ABI 动态库
        - Rust crate（直接依赖）
        - WASM 组件
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MemoryCenter 版本
      placeholder: 0.1.0 或 commit hash
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust 版本
      placeholder: "rustc 1.88.0"
      description: 运行 `rustc --version` 获取
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 服务端日志 / 客户端日志（脱敏后）
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 Issue，确认这不是重复报告
          required: true
        - label: 我已查阅 Wiki 与 README，确认这不是使用问题
          required: true
