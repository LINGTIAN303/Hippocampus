name: ✨ 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请说明你的使用场景与期望效果。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到了什么问题，或什么场景下当前能力不足
      placeholder: 当我需要 ... 时，现有工具无法做到 ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望 MemoryCenter 提供什么能力
      placeholder: 希望提供一个 xxx tool，调用方式 ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 你考虑过哪些其他方案，为什么不满意
    validations:
      required: false

  - type: dropdown
    id: interface
    attributes:
      label: 主要受益的接入方式
      description: 这个功能主要服务于哪种接入方式
      options:
        - MCP Server (所有客户端通用)
        - HTTP REST API
        - Python 原生绑定
        - Node.js 绑定
        - C ABI
        - Rust crate
        - WASM 组件
        - 全部
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 改动范围
      description: 你预估这个功能的改动规模
      options:
        - 小（单个 crate 内）
        - 中（跨 2-3 个 crate）
        - 大（涉及核心架构）
        - 不确定
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 Issue 与 Discussions，确认这不是重复请求
          required: true
        - label: 我已查阅 Roadmap（README 项目状态章节），确认未在路线图中
          required: true
