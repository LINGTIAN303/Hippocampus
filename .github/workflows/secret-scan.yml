name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # detect-secrets：基于熵 + 正则的密钥扫描（Yelp 出品）
  # ============================================================================
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          # 生成当前仓库的 secrets baseline
          detect-secrets scan --all-files --force-use-all-plugins > .secrets.current.baseline || true

          # 如果存在已知的 baseline（白名单），则与当前对比
          if [ -f .secrets.baseline ]; then
            echo "📋 已知 baseline 存在，进行 diff 审计..."
            detect-secrets audit --report .secrets.current.baseline || true
            # 使用 baseline diff 工具，仅报告新增的密钥
            NEW_SECRETS=$(detect-secrets scan --all-files --baseline .secrets.baseline 2>&1 | grep -c "Secrets added:" || true)
            if [ "$NEW_SECRETS" -gt 0 ]; then
              echo "❌ 发现新增的密钥泄露"
              exit 1
            fi
          else
            # 无 baseline，直接扫描结果中是否有密钥
            SECRET_COUNT=$(jq '.results | length' .secrets.current.baseline)
            if [ "$SECRET_COUNT" -gt 0 ]; then
              echo "❌ 发现 $SECRET_COUNT 处可能的密钥泄露："
              jq -r '.results | to_entries[] | .key as $file | .value[] | "\($file):\(.line_number): \(.type)"' .secrets.current.baseline
              exit 1
            fi
          fi

          echo "✅ detect-secrets 扫描通过"
          rm -f .secrets.current.baseline

  # ============================================================================
  # gitleaks：基于规则 + 熵的密钥扫描（Git history + 当前文件）
  # ============================================================================
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，扫描所有提交

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 如需自定义规则，创建 .gitleaks.toml 配置文件
