# Dependabot 依赖更新配置
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # GitHub Actions 依赖更新（weekly）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    group: true  # 将多个 actions 更新合并到一个 PR

  # Cargo 依赖更新（weekly）
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 不自动合并 major 版本更新（Rust 生态 major 常有破坏性）
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
