# OpenWorld 站点（openworld.dpdns.org）
#
# 部署位置：/etc/nginx/sites-enabled/openworld
#
# 职责：
#   1. 静态资源服务（前端 SPA）
#   2. /api/ 反代后端 OpenWorld 服务（127.0.0.1:3000）
#   3. /memory-center/ 反代 MemoryCenter API（127.0.0.1:8765）
#   4. /mcp 反代 MemoryCenter MCP 端点（127.0.0.1:8765，SSE 流）
#   5. /ws WebSocket 代理（Agent 流式对话）

server {
    listen 80;
    server_name openworld.dpdns.org;

    # 安全响应头（S-05 安全加固）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 请求体大小限制
    client_max_body_size 10m;

    # 静态资源根目录（dist.zip 解压路径）
    root /opt/openworld/source/frontend/dist;

    # 静态资源缓存（Nginx 直接服务，不经过后端 rust-embed）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket 支持（Agent 流式对话必需）
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 健康检查 + Metrics
    location ~ ^/(healthz|metrics)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MemoryCenter 记忆库 API 反代（子路径 /memory-center/ → 127.0.0.1:8765）
    # 鉴权由后端 memory-center-server 中间件处理
    location /memory-center/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # MCP Streamable HTTP 端点反代（v2.36，S-03 鉴权预校验）
    # SSE 流支持：proxy_buffering off + HTTP/1.1 + Connection 清空 + 长超时
    # 客户端访问 URL：http://openworld.dpdns.org/mcp
    # 鉴权预校验：要求 Authorization: Bearer <key>（节省后端 SSE 连接资源）
    location /mcp {
        if ($http_authorization !~ "^Bearer .+$") {
            return 401 '{"error":{"code":"UNAUTHORIZED","message":"Missing or invalid Authorization header"}}';
        }
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流必需：关闭缓冲，实时转发事件
        proxy_buffering off;
        proxy_cache off;
        # SSE 长连接超时（24h，与 /ws 一致）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback：所有其他请求返回 index.html（前端路由）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
